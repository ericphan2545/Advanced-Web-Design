<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
  <div class="top">
    <div class="title-container">
      <h2 class="title-product">WOMEN'S PRODUCTS</h2>
    </div>
    <div class="nav-bar">
      <div>All</div>
      <div>Clothings</div>
      <div>Bags</div>
      <div>Shoes</div>
      <div>Watches</div>
      <div>Goggles</div>
    </div>
  </div>

  <div class="mid">
    <div class="product-list">
      
      <div class="product-card">
        <div class="image-wrapper">
          <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=500&auto=format&fit=crop&q=60" alt="Women Bags">
        </div>
        <h3>Women Bags</h3>
        <div class="price-container">
          <span class="price-current">€100.00</span>
          <br> <span class="price-old">€50.00</span>
        </div>
        <button class="btn-add">ADD TO CART</button>
      </div>

      <div class="product-card">
        <div class="image-wrapper">
          <img src="goggle.jpg" alt="Goggle">
        </div>
        <h3>Goggle</h3>
        <div class="price-container">
          <span class="price-current">€25.00</span>
        </div>
        <button class="btn-add">ADD TO CART</button>
      </div>

    </div>

    <div class="banner">
      <img src="https://images.unsplash.com/photo-1552874869-5c39ec9288dc?w=800&auto=format&fit=crop&q=60" alt="Banner" class="banner-img">
      <div class="banner-content">
        <h2>FOR WOMEN</h2>
        <button class="btn-view-all">VIEW ALL</button>
      </div>
    </div>
  </div>
</body>
</html>
