<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điểm Của Em</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 class="title">BANG DIEM CUA EM</h2>

        <div class="form-group">
            <label>Semester1:</label>
            <input type="number" id="sem1" value="9">
        </div>

        <div class="form-group">
            <label>Semester2:</label>
            <input type="number" id="sem2" value="10">
        </div>

        <div class="form-group">
            <label>Year:</label>
            <select id="year">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Summarise:</label>
            <input type="text" id="summary" readonly>
        </div>

        <div id="result-text" class="result-text"></div>

        <div class="button-group">
            <button onclick="calculate()">OK</button>
            <button onclick="cancel()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
