<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
  <body>
    Customer Name: <br> <input type="text" id="customerName" />
    <br>
    Product ID: <br> <input type="text" id="productId" />
    <br>
    Product Name: <br> <input type="text" id="productName" />
    <br>
    Product Quantity: <br> <input type="number" id="productQuantity" />
    <br>
    Product Price: <br> <input type="number" id="productPrice" step="0.01" />
    <br>

    <input type="button" value="Save" onclick="save()">
    <input type="button" value="Show" onclick="show()">
    <input type="button" value="Reset" onclick="reset()">

    <table class="table">
        <thead class="thead-dark">
            <tr>
                <th>Order</th>
                <th>Customer Name</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Quantity</th>
                <th>Product Price</th>
                <th>Discount</th>
                <th>Amount</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="orderTableBody">
        </tbody>
    </table>
    <script src="script.js"></script>
  </body>
</html>
